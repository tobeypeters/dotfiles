; Polybar configuration

[color]
bg = ${xrdb:color0:#ffffff}
fg = ${xrdb:color1:#000000}
primary_color = ${xrdb:color0:#000000}
comp_color = ${xrdb:color3:#000000}
comp_color2 = ${xrdb:color4:#000000}
dot = ${xrdb:color2:#000000}
    
[bar/main-i3]
background = ${xrdb:color0:#ffffff}
foreground = ${xrdb:color1:#000000}

height = 18

border-size = 1
border-color = ${xrdb:color6:#000000}

radius-top = 8
 
monitor = HDMI-A-1

font-0 = "System San Francisco Display:pixelsize=9;3"
font-1 = "Iosevka Nerd Font:pixelsize=13; 3"
;font-4 = "NotoSans Nerd Font:size=16;4"

enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

tray-position = right
tray-background = ${color.primary_color}
tray-padding = 2

;== Modules ===============================================
modules-left = menu windowbase 
;modules-center =
modules-right = workspaces volume search date

[module/base]
content-padding = 1

[module/arrowbase]
content-background = ${color.fg}
content-foreground = ${color.bg}

[module/menu]
type = custom/text
inherit = module/base

content = "  "
click-left = ~/.config/polybar/scripts/sysmenu.py --menu_colors "#FFFFFF" "#000000" "#B7B7B7"

[module/windowbase]
type = custom/script

exec = python3 -u ~/.config/polybar/scripts/window_info.py --len_title 50 --application_colors "#B7B7B7" "#FFFFFF" --title_colors "#B7B7B7" "#000000"

click-left = xdotool key super+ctrl+Tab
;click-left = i3-msg "nop window selector"
click-middle = xdotool key super+Tab
click-right = xdotool key super+shift+Tab

tail = true

[module/application-title]
type = custom/script
inherit = module/windowbase
exec = python3 -u ~/.config/polybar/scripts/window_info.py --application --application_colors "#B7B7B7" "#FFFFFF"

[module/window-title]
type = custom/script
inherit = module/windowbase
exec = python3 -u ~/.config/polybar/scripts/window_info.py --title --title_colors "#B7B7B7" "#00000"

[module/arrowleft]
type = custom/text
inherit = module/arrowbase
content = 

[module/workspaces]
type = internal/xworkspaces
enable-click = true
enable-scroll = true

icon-default = 

format = <label-state>

label-active = 

label-empty = ${self.label-active}
label-empty-padding = 1

label-active-padding = ${self.label-empty-padding}
label-active-foreground = ${color.comp_color2}

label-urgent-padding = ${self.label-empty-padding}

label-occupied-padding = ${self.label-empty-padding}

[module/volume]
type = internal/pulseaudio
sink = alsa_output.pci-0000_12_00.3.analog-stereo
use-ui-max = false
interval = 1

click-right = exec pavucontrol

format-volume-padding = 1
format-volume = <ramp-volume> <label-volume>

label-muted = " muted"
label-muted-padding = ${self.format-volume-padding}
label-muted-foreground = ${color.bg}
label-muted-background = ${color.fg}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/search]
type = custom/text
inherit = module/base
content = 
;Launches krunner
click-left = xdotool key super+F2

[module/date]
type = internal/date
interval = 30

time = %a %I:%M %p
time-alt = %a %D

label = %time%
label-padding = 1

[module/arrowright]
type = custom/text
inherit = module/arrowbase
content = 